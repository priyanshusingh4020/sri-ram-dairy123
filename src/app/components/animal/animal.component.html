<div class="animal-container">
  <div class="header">
    <h2>Animal Management</h2>
    <button class="btn btn-primary" (click)="openForm()">+ Add Animal</button>
  </div>

  <div *ngIf="showForm" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>{{ editingId ? 'Edit Animal' : 'Add New Animal' }}</h3>
        <button class="close-btn" (click)="closeForm()">×</button>
      </div>
      
      <form (ngSubmit)="saveAnimal()" class="form">
        <div class="form-group">
          <label>Name</label>
          <input type="text" [(ngModel)]="form.name" name="name" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Type</label>
            <select [(ngModel)]="form.type" name="type">
              <option value="cow">Cow</option>
              <option value="buffalo">Buffalo</option>
              <option value="goat">Goat</option>
            </select>
          </div>

          <div class="form-group">
            <label>Breed</label>
            <input type="text" [(ngModel)]="form.breed" name="breed" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Age (years)</label>
            <input type="number" [(ngModel)]="form.age" name="age" required>
          </div>

          <div class="form-group">
            <label>Weight (kg)</label>
            <input type="number" [(ngModel)]="form.weight" name="weight" required>
          </div>
        </div>

        <div class="form-group">
          <label>Status</label>
          <select [(ngModel)]="form.status" name="status">
            <option value="healthy">Healthy</option>
            <option value="sick">Sick</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>

        <div class="modal-actions">
          <button type="submit" class="btn btn-primary">Save</button>
          <button type="button" class="btn btn-secondary" (click)="closeForm()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <div class="animals-list">
    <div *ngIf="animals.length === 0" class="empty-state">
      <p>No animals added yet. Add your first animal to get started!</p>
    </div>

    <div *ngFor="let animal of animals" class="animal-card">
      <div class="card-header">
        <h3>{{ animal.name }}</h3>
        <span class="badge" [style.backgroundColor]="getStatusColor(animal.status)" (click)="toggleStatus(animal)" style="cursor: pointer;">{{ animal.status }}</span>
      </div>

      <div class="card-body">
        <div class="info-row">
          <span class="label">Type:</span>
          <span class="value">{{ animal.type | uppercase }}</span>
        </div>
        <div class="info-row">
          <span class="label">Breed:</span>
          <span class="value">{{ animal.breed }}</span>
        </div>
        <div class="info-row">
          <span class="label">Age:</span>
          <span class="value">{{ animal.age }} years</span>
        </div>
        <div class="info-row">
          <span class="label">Weight:</span>
          <span class="value">{{ animal.weight }} kg</span>
        </div>
      </div>

      <div class="card-actions">
        <button class="btn btn-sm btn-primary" (click)="openForm(animal)">Edit</button>
        <button class="btn btn-sm btn-danger" (click)="deleteAnimal(animal.id)">Delete</button>
      </div>
    </div>
  </div>
</div>

<style>
  .animal-container {
    padding: 20px;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
  }

  .modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }

  .modal-content {
    background: white;
    padding: 30px;
    border-radius: 8px;
    max-width: 500px;
    width: 90%;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .close-btn {
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
  }

  .form {
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
  }

  .form-group label {
    font-weight: 500;
    font-size: 14px;
  }

  .form-group input,
  .form-group select {
    padding: 8px 12px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 14px;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .animals-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }

  .animal-card {
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }

  .card-header {
    background: #f5f5f5;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .card-header h3 {
    margin: 0;
    font-size: 18px;
  }

  .badge {
    color: white;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
  }

  .card-body {
    padding: 15px;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #f0f0f0;
  }

  .info-row .label {
    font-weight: 600;
    color: #666;
  }

  .card-actions {
    padding: 15px;
    display: flex;
    gap: 10px;
    border-top: 1px solid #e0e0e0;
  }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: #999;
  }
</style>
