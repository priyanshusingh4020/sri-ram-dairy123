<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>🐄 Sri Ram Dairy</h1>
      <p>Farm Management System</p>
    </div>

    <div class="login-body">
      <h2>Sign In</h2>

      <div *ngIf="errorMessage" class="error-message">
        ❌ {{ errorMessage }}
      </div>

      <form (ngSubmit)="login()">
        <!-- Email Field -->
        <div class="form-group">
          <label for="email">📧 Email Address</label>
          <input
            type="email"
            id="email"
            [(ngModel)]="email"
            name="email"
            placeholder="Enter your email"
            class="form-input"
            [disabled]="isLoading"
          />
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label for="password">🔐 Password</label>
          <div class="password-input-wrapper">
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="password"
              [(ngModel)]="password"
              name="password"
              placeholder="Enter your password"
              class="form-input"
              [disabled]="isLoading"
            />
            <button
              type="button"
              class="password-toggle"
              (click)="togglePasswordVisibility()"
              [disabled]="isLoading"
            >
              {{ showPassword ? '🙈 Hide' : '👁️ Show' }}
            </button>
          </div>
        </div>

        <!-- Login Button -->
        <button
          type="submit"
          class="btn btn-primary login-btn"
          [disabled]="isLoading"
        >
          {{ isLoading ? '⏳ Signing in...' : '✅ Sign In' }}
        </button>
      </form>

      <!-- Demo Login -->
      <div class="demo-section">
        <p class="demo-text">Try demo account:</p>
        <button
          type="button"
          class="btn btn-secondary demo-btn"
          (click)="demoLogin()"
          [disabled]="isLoading"
        >
          🧪 Use Demo Credentials
        </button>
        <p class="demo-info">Email: demo@example.com | Password: demo123</p>
      </div>

      <!-- Sign Up Link -->
      <div class="signup-section">
        <p>Don't have an account?</p>
        <button
          type="button"
          class="btn btn-link signup-link"
          (click)="navigateToRegister()"
        >
          Create account
        </button>
      </div>
    </div>
  </div>
</div>
